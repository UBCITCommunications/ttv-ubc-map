<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Campus Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2.5vh 3vw 2vh 3vw;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #21262d;
    z-index: 10;
  }
  .subhead {
    font-size: 0.85vw;
    color: #7d8590;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.5vh;
  }
  .heading {
    font-size: 2vw;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .meta {
    font-size: 0.8vw;
    color: #484f58;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .meta strong { color: #c9d1d9; font-weight: 500; }

  #map {
    flex: 1;
    background: #0d1117;
  }
  .leaflet-container { background: #0d1117; outline: 0; }
  .leaflet-control-attribution {
    background: rgba(13, 17, 23, 0.7) !important;
    color: #7d8590 !important;
    font-size: 0.6vw !important;
  }
  .leaflet-control-attribution a { color: #58a6ff !important; }

  /* Building popup styling */
  .leaflet-popup-content-wrapper {
    background: #161b22;
    color: #e6edf3;
    border-radius: 0.3vw;
    border: 1px solid #30363d;
    box-shadow: 0 0.3vw 1vw rgba(0,0,0,0.6);
  }
  .leaflet-popup-content {
    margin: 1vw 1.2vw;
    font-family: inherit;
    font-size: 0.85vw;
    line-height: 1.5;
  }
  .leaflet-popup-tip { background: #161b22; }
  .leaflet-popup-close-button { color: #7d8590 !important; }

  .pop-name {
    font-size: 1.1vw;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 0.5vh;
  }
  .pop-tag {
    display: inline-block;
    background: #21262d;
    color: #58a6ff;
    padding: 0.2vh 0.6vw;
    border-radius: 0.2vw;
    font-size: 0.7vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1vh;
  }
  .pop-row {
    display: flex;
    gap: 1vw;
    margin-bottom: 0.5vh;
  }
  .pop-label {
    color: #7d8590;
    font-size: 0.7vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-width: 5vw;
  }
  .pop-value {
    color: #e6edf3;
    flex: 1;
  }

  /* Legend bottom-right */
  .legend {
    position: absolute;
    bottom: 2vh;
    right: 2vw;
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #21262d;
    border-radius: 0.3vw;
    padding: 1.2vh 1vw;
    z-index: 500;
    font-size: 0.75vw;
  }
  .legend-title {
    font-size: 0.7vw;
    color: #7d8590;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 1vh;
  }
  .legend-row {
    display: flex;
    align-items: center;
    gap: 0.6vw;
    margin-bottom: 0.5vh;
  }
  .legend-swatch {
    width: 1.1vw;
    height: 1.1vw;
    border-radius: 0.15vw;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .legend-label {
    color: #c9d1d9;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    color: #484f58;
    font-size: 1.5vw;
    z-index: 1000;
  }
  .loading.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <div class="subhead">UBC Vancouver Campus</div>
    <div class="heading">Buildings &amp; Spaces</div>
  </div>
  <div class="meta">
    Data · <strong>UBCGeodata</strong> · <span id="count">—</span> buildings
  </div>
</header>

<div id="map"></div>

<div class="legend">
  <div class="legend-title">Building Type</div>
  <div class="legend-row"><div class="legend-swatch" style="background:#58a6ff"></div><div class="legend-label">Academic / Campus</div></div>
  <div class="legend-row"><div class="legend-swatch" style="background:#a371f7"></div><div class="legend-label">Student Housing</div></div>
  <div class="legend-row"><div class="legend-swatch" style="background:#f0883e"></div><div class="legend-label">Residential</div></div>
  <div class="legend-row"><div class="legend-swatch" style="background:#7ee787"></div><div class="legend-label">Athletic / Recreation</div></div>
  <div class="legend-row"><div class="legend-swatch" style="background:#8b949e"></div><div class="legend-label">Other</div></div>
</div>

<div class="loading" id="loading">Loading campus map…</div>

<script>
const DATA_URL = 'https://raw.githubusercontent.com/UBCGeodata/ubc-geospatial-opendata/master/ubcv/locations/geojson/ubcv_buildings_simple.geojson';

// UBC Vancouver center
const UBC_CENTER = [49.2606, -123.2460];

// Building colors by usage type
function styleFor(usage) {
  switch ((usage || '').toLowerCase()) {
    case 'studenthousing':
      return { fill: '#a371f7', stroke: '#a371f7' };
    case 'residential':
      return { fill: '#f0883e', stroke: '#f0883e' };
    case 'athletic':
    case 'recreation':
    case 'athleticbuilding':
      return { fill: '#7ee787', stroke: '#7ee787' };
    case 'campusbuilding':
    case 'academic':
      return { fill: '#58a6ff', stroke: '#58a6ff' };
    default:
      return { fill: '#8b949e', stroke: '#8b949e' };
  }
}

async function init() {
  const map = L.map('map', {
    zoomControl: true,
    attributionControl: true,
  }).setView(UBC_CENTER, 15);

  // CARTO Dark Matter basemap
  L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO',
    subdomains: 'abcd',
    maxZoom: 19,
  }).addTo(map);

  // Load building footprints
  try {
    const res = await fetch(DATA_URL);
    const data = await res.json();
    drawBuildings(map, data);
    document.getElementById('count').textContent = (data.features || []).length;
    document.getElementById('loading').classList.add('hidden');
  } catch (e) {
    console.error('Building data load failed:', e);
    document.getElementById('loading').textContent = 'Unable to load building data.';
  }
}

function drawBuildings(map, geojson) {
  L.geoJSON(geojson, {
    style: feature => {
      const s = styleFor(feature.properties.BLDG_USAGE);
      return {
        color: s.stroke,
        weight: 1,
        opacity: 0.85,
        fillColor: s.fill,
        fillOpacity: 0.5,
      };
    },
    onEachFeature: (feature, layer) => {
      const p = feature.properties || {};
      layer.bindPopup(buildPopup(p), { maxWidth: 320 });
      layer.on({
        mouseover: e => e.target.setStyle({ weight: 2.5, fillOpacity: 0.75 }),
        mouseout:  e => e.target.setStyle({ weight: 1,   fillOpacity: 0.5  }),
      });
    },
  }).addTo(map);
}

function buildPopup(p) {
  const name = p.NAME || p.SHORTNAME || 'Unnamed Building';
  const usage = humanUsage(p.BLDG_USAGE);
  const addr = p.PRIMARY_ADDRESS || '—';
  const neigh = p.NEIGHBOURHOOD || '';
  const floors = p.MAX_FLOORS != null ? p.MAX_FLOORS : null;
  const occu = formatOccupancyDate(p.OCCU_DATE);

  let html = `
    <div class="pop-name">${escapeHtml(name)}</div>
    ${usage ? `<div class="pop-tag">${escapeHtml(usage)}</div>` : ''}
    <div class="pop-row"><div class="pop-label">Address</div><div class="pop-value">${escapeHtml(addr)}</div></div>
  `;
  if (neigh) html += `<div class="pop-row"><div class="pop-label">Area</div><div class="pop-value">${escapeHtml(neigh)}</div></div>`;
  if (floors !== null) html += `<div class="pop-row"><div class="pop-label">Floors</div><div class="pop-value">${floors}</div></div>`;
  if (occu) html += `<div class="pop-row"><div class="pop-label">Opened</div><div class="pop-value">${occu}</div></div>`;
  return html;
}

function humanUsage(u) {
  const map = {
    CampusBuilding: 'Campus Building',
    StudentHousing: 'Student Housing',
    Residential: 'Residential',
    OtherBuilding: 'Other',
    AthleticBuilding: 'Athletic',
  };
  return map[u] || u || '';
}

function formatOccupancyDate(s) {
  // OCCU_DATE looks like "19680101"
  if (!s || s.length < 4) return '';
  const y = s.slice(0, 4);
  const m = s.slice(4, 6);
  const d = s.slice(6, 8);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mi = parseInt(m, 10) - 1;
  if (!isNaN(mi) && mi >= 0 && mi < 12 && d !== '01') {
    return `${months[mi]} ${parseInt(d, 10)}, ${y}`;
  }
  if (!isNaN(mi) && mi >= 0 && mi < 12) {
    return `${months[mi]} ${y}`;
  }
  return y;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

init();
</script>
</body>
</html>
