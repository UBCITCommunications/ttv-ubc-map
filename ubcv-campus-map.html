<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>UBC Campus Map</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css">
<script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; overflow: hidden; }
  body {
    background: #0d1117;
    color: #e6edf3;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    font-weight: 300;
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    padding: 2.5vh 3vw 2vh 3vw;
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    border-bottom: 1px solid #21262d;
    z-index: 10;
  }
  .subhead {
    font-size: 0.85vw;
    color: #7d8590;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    margin-bottom: 0.5vh;
  }
  .heading {
    font-size: 2vw;
    font-weight: 500;
    letter-spacing: -0.01em;
  }
  .meta {
    font-size: 0.8vw;
    color: #484f58;
    letter-spacing: 0.2em;
    text-transform: uppercase;
  }
  .meta strong { color: #c9d1d9; font-weight: 500; }

  #map {
    flex: 1;
    background: #0d1117;
  }
  .leaflet-container { background: #0d1117; outline: 0; }
  .leaflet-control-attribution {
    background: rgba(13, 17, 23, 0.7) !important;
    color: #7d8590 !important;
    font-size: 0.6vw !important;
  }
  .leaflet-control-attribution a { color: #58a6ff !important; }

  /* Popup styling */
  .leaflet-popup-content-wrapper {
    background: #161b22;
    color: #e6edf3;
    border-radius: 0.3vw;
    border: 1px solid #30363d;
    box-shadow: 0 0.3vw 1vw rgba(0,0,0,0.6);
  }
  .leaflet-popup-content {
    margin: 1vw 1.2vw;
    font-family: inherit;
    font-size: 0.85vw;
    line-height: 1.5;
  }
  .leaflet-popup-tip { background: #161b22; }
  .leaflet-popup-close-button { color: #7d8590 !important; }

  .pop-name {
    font-size: 1.1vw;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 0.5vh;
  }
  .pop-tag {
    display: inline-block;
    background: #21262d;
    color: #58a6ff;
    padding: 0.2vh 0.6vw;
    border-radius: 0.2vw;
    font-size: 0.7vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-bottom: 1vh;
  }
  .pop-tag.tree-tag { color: #7ee787; }
  .pop-row {
    display: flex;
    gap: 1vw;
    margin-bottom: 0.5vh;
  }
  .pop-label {
    color: #7d8590;
    font-size: 0.7vw;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    min-width: 5vw;
  }
  .pop-value {
    color: #e6edf3;
    flex: 1;
  }

  /* PANEL: layers + filters + basemap, right side */
  .panel {
    position: absolute;
    top: 13vh;
    right: 2vw;
    background: rgba(13, 17, 23, 0.92);
    backdrop-filter: blur(8px);
    border: 1px solid #21262d;
    border-radius: 0.3vw;
    padding: 1.4vh 1.2vw;
    z-index: 500;
    font-size: 0.75vw;
    width: 14vw;
  }
  .panel-section + .panel-section {
    margin-top: 1.4vh;
    padding-top: 1.4vh;
    border-top: 1px solid #21262d;
  }
  .panel-title {
    font-size: 0.7vw;
    color: #7d8590;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    margin-bottom: 1vh;
  }

  .toggle-row {
    display: flex;
    align-items: center;
    gap: 0.6vw;
    padding: 0.4vh 0;
    cursor: pointer;
    user-select: none;
  }
  .toggle-row input { display: none; }
  .toggle-row .toggle-box {
    width: 1.1vw;
    height: 1.1vw;
    border-radius: 0.15vw;
    border: 1px solid rgba(255, 255, 255, 0.25);
    background: #161b22;
    flex-shrink: 0;
    position: relative;
  }
  .toggle-row input:checked + .toggle-box::after {
    content: '✓';
    position: absolute;
    inset: 0;
    color: #fff;
    font-size: 0.8vw;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .toggle-row.disabled { opacity: 0.35; cursor: default; }

  .toggle-row .swatch {
    width: 1.1vw;
    height: 1.1vw;
    border-radius: 0.15vw;
    border: 1px solid rgba(255,255,255,0.15);
    flex-shrink: 0;
  }
  .toggle-row .label {
    color: #c9d1d9;
    flex: 1;
  }
  .toggle-row .count {
    font-size: 0.7vw;
    color: #6e7681;
    font-variant-numeric: tabular-nums;
  }

  .basemap-row {
    display: flex;
    gap: 0.4vw;
    margin-top: 0.5vh;
  }
  .basemap-btn {
    flex: 1;
    background: #161b22;
    border: 1px solid #30363d;
    color: #c9d1d9;
    padding: 0.7vh 0;
    font-size: 0.7vw;
    letter-spacing: 0.05em;
    border-radius: 0.2vw;
    cursor: pointer;
    text-align: center;
    font-family: inherit;
    transition: background 0.15s;
  }
  .basemap-btn:hover { background: #21262d; }
  .basemap-btn.active {
    background: #58a6ff;
    color: #0d1117;
    border-color: #58a6ff;
    font-weight: 500;
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #0d1117;
    color: #484f58;
    font-size: 1.5vw;
    z-index: 1000;
  }
  .loading.hidden { display: none; }
</style>
</head>
<body>

<header>
  <div>
    <div class="subhead">UBC Vancouver Campus</div>
    <div class="heading">Buildings &amp; Trees</div>
  </div>
  <div class="meta">
    <strong id="bldg-count">—</strong> buildings &nbsp;·&nbsp; <strong id="tree-count">—</strong> trees
  </div>
</header>

<div id="map"></div>

<div class="panel">
  <div class="panel-section">
    <div class="panel-title">Layers</div>
    <label class="toggle-row" id="lyr-buildings-row">
      <input type="checkbox" id="lyr-buildings" checked>
      <span class="toggle-box"></span>
      <span class="label">Buildings</span>
    </label>
    <label class="toggle-row" id="lyr-trees-row">
      <input type="checkbox" id="lyr-trees">
      <span class="toggle-box"></span>
      <span class="label">Trees</span>
    </label>
  </div>

  <div class="panel-section" id="bldg-filter-section">
    <div class="panel-title">Building Filter</div>
  </div>

  <div class="panel-section">
    <div class="panel-title">Basemap</div>
    <div class="basemap-row">
      <button class="basemap-btn active" data-basemap="dark">Dark</button>
      <button class="basemap-btn" data-basemap="light">Light</button>
      <button class="basemap-btn" data-basemap="topo">Topo</button>
    </div>
  </div>
</div>

<div class="loading" id="loading">Loading campus map…</div>

<script>
const BUILDINGS_URL = 'https://raw.githubusercontent.com/UBCGeodata/ubc-geospatial-opendata/master/ubcv/locations/geojson/ubcv_buildings.geojson';
const TREES_URL     = 'https://raw.githubusercontent.com/UBCGeodata/ubc-geospatial-opendata/master/ubcv/landscape/geojson/ubcv_campus_trees.geojson';

const UBC_CENTER = [49.2606, -123.2460];

const USAGE_KEYS = [
  'Academic', 'Research', 'Housing', 'StudentHousing',
  'Athletics', 'Commons', 'Administrative', 'Commercial',
  'Services', 'Operations', 'Parking', 'Other',
];

const USAGE_COLOR = {
  Academic: '#58a6ff', Research: '#79c0ff',
  Housing: '#a371f7', StudentHousing: '#bc8cff',
  Athletics: '#7ee787', Commons: '#e3b341',
  Administrative: '#39c5cf', Commercial: '#f0883e',
  Services: '#8b949e', Operations: '#6e7681',
  Parking: '#484f58', Other: '#8b949e',
};

const USAGE_LABEL = {
  Academic: 'Academic', Research: 'Research',
  Housing: 'Housing', StudentHousing: 'Student Housing',
  Athletics: 'Athletics', Commons: 'Commons',
  Administrative: 'Administrative', Commercial: 'Commercial',
  Services: 'Services', Operations: 'Operations',
  Parking: 'Parking', Other: 'Other',
};

const BASEMAPS = {
  dark:  () => L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO', subdomains: 'abcd', maxZoom: 19,
  }),
  light: () => L.tileLayer('https://{s}.basemaps.cartocdn.com/voyager/{z}/{x}/{y}{r}.png', {
    attribution: '© OpenStreetMap, © CARTO', subdomains: 'abcd', maxZoom: 19,
  }),
  topo:  () => L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
    attribution: '© OpenStreetMap, © OpenTopoMap', subdomains: 'abc', maxZoom: 17,
  }),
};

let map;
let currentBasemap;
let buildingsLayer;
let treesLayer;
let allBuildings = [];
let activeUsages = new Set(USAGE_KEYS);

function styleFor(usage) {
  const c = USAGE_COLOR[usage] || USAGE_COLOR.Other;
  return { color: c, weight: 1, opacity: 0.85, fillColor: c, fillOpacity: 0.5 };
}

async function init() {
  map = L.map('map', { zoomControl: true, attributionControl: true })
        .setView(UBC_CENTER, 15);

  setBasemap('dark');

  buildingsLayer = L.layerGroup().addTo(map);

  const [bResp, tResp] = await Promise.allSettled([
    fetch(BUILDINGS_URL).then(r => r.json()),
    fetch(TREES_URL).then(r => r.json()),
  ]);

  if (bResp.status === 'fulfilled') {
    allBuildings = bResp.value.features || [];
    renderBuildings();
    renderBuildingFilters();
    document.getElementById('bldg-count').textContent = allBuildings.length;
  } else {
    console.error('Buildings failed:', bResp.reason);
    document.getElementById('bldg-count').textContent = 'err';
  }

  if (tResp.status === 'fulfilled') {
    const treeFeatures = tResp.value.features || [];
    console.log('Tree feature sample:', treeFeatures[0]);
    treesLayer = buildTreesLayer(treeFeatures);
    document.getElementById('tree-count').textContent = treeFeatures.length.toLocaleString();
  } else {
    console.error('Trees failed:', tResp.reason);
    document.getElementById('tree-count').textContent = 'unavailable';
    document.getElementById('lyr-trees-row').classList.add('disabled');
    document.getElementById('lyr-trees').disabled = true;
  }

  document.getElementById('loading').classList.add('hidden');
  wireLayerToggles();
  wireBasemapButtons();
}

function setBasemap(key) {
  if (currentBasemap) map.removeLayer(currentBasemap);
  currentBasemap = BASEMAPS[key]().addTo(map);
  document.querySelectorAll('.basemap-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.basemap === key);
  });
}

function renderBuildings() {
  buildingsLayer.clearLayers();
  const filtered = {
    type: 'FeatureCollection',
    features: allBuildings.filter(f => {
      const u = f.properties?.BLDG_USAGE || 'Other';
      return activeUsages.has(u);
    }),
  };
  const geo = L.geoJSON(filtered, {
    style: f => styleFor(f.properties?.BLDG_USAGE || 'Other'),
    onEachFeature: (feature, layer) => {
      const p = feature.properties || {};
      layer.bindPopup(buildBldgPopup(p), { maxWidth: 320 });
      layer.on({
        mouseover: e => e.target.setStyle({ weight: 2.5, fillOpacity: 0.75 }),
        mouseout:  e => e.target.setStyle({ weight: 1,   fillOpacity: 0.5  }),
      });
    },
  });
  buildingsLayer.addLayer(geo);
}

function buildTreesLayer(features) {
  // Canvas renderer for performance — many points
  const canvasRenderer = L.canvas({ padding: 0.5 });
  const treeFC = { type: 'FeatureCollection', features };

  return L.geoJSON(treeFC, {
    pointToLayer: (feature, latlng) => L.circleMarker(latlng, {
      renderer: canvasRenderer,
      radius:   2,
      color:    '#7ee787',
      weight:   0,
      fillColor:'#7ee787',
      fillOpacity: 0.7,
    }),
    onEachFeature: (feature, layer) => {
      const p = feature.properties || {};
      layer.bindPopup(buildTreePopup(p), { maxWidth: 280 });
    },
  });
}

function buildBldgPopup(p) {
  const name = p.NAME || p.SHORTNAME || 'Unnamed Building';
  const usage = USAGE_LABEL[p.BLDG_USAGE] || p.BLDG_USAGE || '';
  const addr = p.PRIMARY_ADDRESS || '—';
  const neigh = p.NEIGHBOURHOOD || '';
  const floors = p.MAX_FLOORS != null ? p.MAX_FLOORS : null;
  const occu = formatOccupancyDate(p.OCCU_DATE);

  let html = `
    <div class="pop-name">${escapeHtml(name)}</div>
    ${usage ? `<div class="pop-tag">${escapeHtml(usage)}</div>` : ''}
    <div class="pop-row"><div class="pop-label">Address</div><div class="pop-value">${escapeHtml(addr)}</div></div>
  `;
  if (neigh) html += `<div class="pop-row"><div class="pop-label">Area</div><div class="pop-value">${escapeHtml(neigh)}</div></div>`;
  if (floors !== null) html += `<div class="pop-row"><div class="pop-label">Floors</div><div class="pop-value">${floors}</div></div>`;
  if (occu) html += `<div class="pop-row"><div class="pop-label">Opened</div><div class="pop-value">${occu}</div></div>`;
  return html;
}

function buildTreePopup(p) {
  // Tree feed field names vary — show what's there
  const species = p.SPECIES || p.species || p.TREE_TYPE || p.tree_type || p.COMMON_NAME || p.common_name;
  const sci     = p.SCI_NAME || p.scientific_name || p.LATIN_NAME;
  const dbh     = p.DBH || p.dbh || p.DIAMETER;
  const height  = p.HEIGHT || p.height;
  const cond    = p.CONDITION || p.condition;

  let html = `<div class="pop-name">${escapeHtml(species || 'Tree')}</div>`;
  html += `<div class="pop-tag tree-tag">Landscape</div>`;
  if (sci)    html += `<div class="pop-row"><div class="pop-label">Species</div><div class="pop-value"><em>${escapeHtml(sci)}</em></div></div>`;
  if (dbh)    html += `<div class="pop-row"><div class="pop-label">Diameter</div><div class="pop-value">${escapeHtml(String(dbh))} cm</div></div>`;
  if (height) html += `<div class="pop-row"><div class="pop-label">Height</div><div class="pop-value">${escapeHtml(String(height))} m</div></div>`;
  if (cond)   html += `<div class="pop-row"><div class="pop-label">Condition</div><div class="pop-value">${escapeHtml(String(cond))}</div></div>`;
  if (!species && !sci && !dbh && !height && !cond) {
    html += `<div class="pop-row"><div class="pop-value" style="color:#7d8590">No additional data</div></div>`;
  }
  return html;
}

function renderBuildingFilters() {
  const counts = {};
  allBuildings.forEach(f => {
    const u = f.properties?.BLDG_USAGE || 'Other';
    counts[u] = (counts[u] || 0) + 1;
  });

  const container = document.getElementById('bldg-filter-section');
  let html = '<div class="panel-title">Building Filter</div>';
  USAGE_KEYS.forEach(u => {
    const count = counts[u] || 0;
    if (count === 0) return;
    html += `
      <label class="toggle-row" data-usage="${u}">
        <input type="checkbox" checked>
        <span class="swatch" style="background:${USAGE_COLOR[u]}"></span>
        <span class="label">${USAGE_LABEL[u]}</span>
        <span class="count">${count}</span>
      </label>
    `;
  });
  container.innerHTML = html;

  container.querySelectorAll('.toggle-row').forEach(row => {
    const input = row.querySelector('input');
    input.addEventListener('change', () => {
      const usage = row.dataset.usage;
      if (input.checked) activeUsages.add(usage);
      else activeUsages.delete(usage);
      renderBuildings();
    });
  });
}

function wireLayerToggles() {
  document.getElementById('lyr-buildings').addEventListener('change', e => {
    if (e.target.checked) buildingsLayer.addTo(map);
    else map.removeLayer(buildingsLayer);
  });
  document.getElementById('lyr-trees').addEventListener('change', e => {
    if (!treesLayer) return;
    if (e.target.checked) treesLayer.addTo(map);
    else map.removeLayer(treesLayer);
  });
}

function wireBasemapButtons() {
  document.querySelectorAll('.basemap-btn').forEach(btn => {
    btn.addEventListener('click', () => setBasemap(btn.dataset.basemap));
  });
}

function formatOccupancyDate(s) {
  if (!s || s.length < 4) return '';
  const y = s.slice(0, 4);
  const m = s.slice(4, 6);
  const d = s.slice(6, 8);
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const mi = parseInt(m, 10) - 1;
  if (!isNaN(mi) && mi >= 0 && mi < 12 && d !== '01') {
    return `${months[mi]} ${parseInt(d, 10)}, ${y}`;
  }
  if (!isNaN(mi) && mi >= 0 && mi < 12) {
    return `${months[mi]} ${y}`;
  }
  return y;
}

function escapeHtml(s) {
  return String(s ?? '').replace(/[&<>"']/g, c => (
    {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]
  ));
}

init();
</script>
</body>
</html>
